services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret_password_aqui}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shopcloud_productos}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - red_bd
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopcloud_postgres}
      POSTGRES_USER: ${POSTGRES_USER:-shopcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret_password_aqui}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - red_bd
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongodb:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    networks:
      - red_bd
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--host", "127.0.0.1", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - red_bd

networks:
  red_bd:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
  mongo_data: